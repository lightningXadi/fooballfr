<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kickoff — Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════ LOBBY ═══ -->
<div id="lobby">

  <div id="lobby-inner">
    <h1>⚽ Kickoff</h1>
    <p class="subtitle">Online Multiplayer</p>

    <div id="nickname-row">
      <label>Your name</label>
      <input id="nickname" type="text" maxlength="10" placeholder="e.g. Messi" />
    </div>

    <div id="tabs">
      <button class="tab active" data-tab="create">Create Room</button>
      <button class="tab" data-tab="join">Join Room</button>
    </div>

    <!-- Create -->
    <div id="tab-create" class="tab-panel">
      <label>Game mode</label>
      <div id="mode-select">
        <button class="mode-btn active" data-mode="1v1">1 v 1</button>
        <button class="mode-btn" data-mode="2v1">2 v 1</button>
        <button class="mode-btn" data-mode="1v2">1 v 2</button>
        <button class="mode-btn" data-mode="2v2">2 v 2</button>
      </div>
      <div class="mode-desc" id="mode-desc">1 player each side</div>
      <button id="create-btn" class="primary-btn">Create Room</button>
    </div>

    <!-- Join -->
    <div id="tab-join" class="tab-panel hidden">
      <label>Room code</label>
      <input id="room-code-input" type="text" maxlength="4" placeholder="e.g. AB3X" style="text-transform:uppercase;letter-spacing:0.2em;font-size:1.4rem;text-align:center;" />
      <button id="join-btn" class="primary-btn">Join Room</button>
    </div>

    <div id="lobby-error"></div>
  </div>

</div>

<!-- ═══════════════════════════════════════════════════════ WAITING ROOM ═══ -->
<div id="waiting-room" class="hidden">
  <div id="waiting-inner">
    <h2>Room ready</h2>
    <div id="room-code-display"></div>
    <p class="waiting-hint">Share this code with friends</p>

    <div id="slots-grid"></div>

    <div id="waiting-controls">
      <button id="start-btn" class="primary-btn hidden">Start Game</button>
      <p id="waiting-msg">Waiting for host to start…</p>
    </div>

    <div id="countdown-display" class="hidden"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ GAME ═══ -->
<div id="game-screen" class="hidden">

  <div id="scoreboard">
    <div class="score-block" id="p1-score-block">
      <div class="label">Left</div>
      <div class="score" id="left-score">0</div>
    </div>
    <div class="score-divider">:</div>
    <div id="timer-block">
      <div class="label">Time</div>
      <div id="timer-display">02:00</div>
    </div>
    <div class="score-divider">:</div>
    <div class="score-block" id="p2-score-block">
      <div class="label">Right</div>
      <div class="score" id="right-score">0</div>
    </div>
  </div>

  <div id="canvas-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div id="goal-flash"></div>
    <div id="fulltime-overlay">
      <div id="fulltime-title">Full Time</div>
      <div id="fulltime-result"></div>
      <button onclick="backToLobby()">↺ Back to Lobby</button>
    </div>
    <div id="disconnect-overlay" class="hidden">
      <div>A player disconnected</div>
      <button onclick="backToLobby()">Back to Lobby</button>
    </div>
  </div>

  <div id="controls-hint">
    <div class="hint-block">Move: <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span></div>
    <div id="your-player-hint"></div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>
</body>
</html>
