<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Kickoff — Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══════ ROTATE PROMPT — only shown during game on portrait mobile ══════════ -->
<div id="rotate-prompt" class="hidden">
  <div class="rotate-phone">📱</div>
  <div class="rotate-arrow">↻</div>
  <p>Rotate to landscape to play</p>
</div>

<!-- ══════════════════════════════════════════════════════════ LOBBY ═════════ -->
<div id="lobby">
  <div id="lobby-inner">
    <h1>⚽ Kickoff</h1>
    <p class="subtitle">Online Multiplayer</p>

    <div id="nickname-row">
      <label>Your name</label>
      <input id="nickname" type="text" maxlength="12" placeholder="e.g. Messi" autocomplete="off" />
    </div>

    <div id="tabs">
      <button class="tab active" data-tab="create">Create Room</button>
      <button class="tab"        data-tab="join">Join Room</button>
    </div>

    <!-- Create -->
    <div id="tab-create" class="tab-panel">
      <label>Game mode</label>
      <div id="mode-select">
        <button class="mode-btn active" data-mode="1v1">
          <span class="mode-icon">👤 v 👤</span>
          <span class="mode-title">1 v 1</span>
          <span class="mode-sub">2 players</span>
        </button>
        <button class="mode-btn" data-mode="2v2">
          <span class="mode-icon">👥 v 👥</span>
          <span class="mode-title">2 v 2</span>
          <span class="mode-sub">2–4 players</span>
        </button>
      </div>
      <p class="mode-desc" id="mode-desc">One player each side</p>
      <button id="create-btn" class="primary-btn">⚽ Create Room</button>
    </div>

    <!-- Join -->
    <div id="tab-join" class="tab-panel hidden">
      <label>Room code</label>
      <input id="room-code-input" type="text" maxlength="4" placeholder="AB3X"
             autocomplete="off" autocorrect="off" autocapitalize="characters"
             inputmode="text" />
      <button id="join-btn" class="primary-btn">🚀 Join Game</button>
    </div>

    <div id="lobby-error"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════ WAITING ROOM ══════════ -->
<div id="waiting-room" class="hidden">
  <div id="waiting-inner">
    <h2>Room Ready</h2>

    <div id="code-area">
      <div id="room-code-display"></div>
      <button id="copy-btn" onclick="copyCode()">
        <span id="copy-icon">📋</span>
        <span id="copy-label">Copy Code</span>
      </button>
    </div>
    <p class="waiting-hint">Share this code with friends</p>

    <div id="slots-grid"></div>

    <div id="waiting-controls">
      <button id="start-btn" class="primary-btn hidden">▶ Start Game</button>
      <p id="waiting-msg"></p>
    </div>

    <div id="countdown-display" class="hidden"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════ GAME ══════════ -->
<div id="game-screen" class="hidden">

  <!-- Canvas fills the entire screen on mobile -->
  <div id="canvas-wrapper">
    <canvas id="gameCanvas"></canvas>

    <!-- Scoreboard floats over canvas -->
    <div id="scoreboard">
      <div class="score-block" id="left-score-block">
        <div class="s-label">Left</div>
        <div class="s-score" id="left-score">0</div>
      </div>
      <div class="s-divider">:</div>
      <div id="timer-block">
        <div class="s-label">Time</div>
        <div id="timer-display">02:00</div>
      </div>
      <div class="s-divider">:</div>
      <div class="score-block" id="right-score-block">
        <div class="s-label">Right</div>
        <div class="s-score" id="right-score">0</div>
      </div>
    </div>

    <!-- Goal flash -->
    <div id="goal-flash"></div>

    <!-- Full time overlay -->
    <div id="fulltime-overlay">
      <div id="fulltime-title">Full Time</div>
      <div id="fulltime-result"></div>
      <button onclick="backToLobby()">↺ Back to Lobby</button>
    </div>

    <!-- Disconnect overlay -->
    <div id="disconnect-overlay" class="hidden">
      <div>A player disconnected</div>
      <button onclick="backToLobby()">Back to Lobby</button>
    </div>

    <!-- Floating joystick (mobile only) — rendered inside canvas-wrapper so it overlays the field -->

    <!-- Desktop controls hint — floats bottom-right -->
    <div id="controls-hint">
      <span>WASD / Arrows to move</span>
      <span id="your-player-hint"></span>
    </div>

  </div><!-- end canvas-wrapper -->
  <div id="joystick-zone" class="hidden">
  <div id="joystick-base">
    <div id="joystick-knob"></div>
  </div>
</div>


</div><!-- end game-screen -->

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>
</body>
</html>
